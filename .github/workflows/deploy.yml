name: Build Flutter Web and Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web --release --base-href "/" \
            --dart-define=APP_ENABLE_REMOTE_TRACKING=true \
            --dart-define=APP_TRACKING_FUNCTION_ID=69e238000035a8d4295f \
            --dart-define=APP_TRACKING_TIMEZONE=Europe/Berlin

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mindfulpractice-app
          directory: build/web