name: Flutter Quality Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    # Node 20 für JS-Actions ist deprecated; Node 24 erzwingen (GitHub-Changelog 2025/2026).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-pub

      - name: Run tests
        run: flutter test --no-pub

      - name: Build web
        run: |
          flutter build web --release --base-href "/" \
            --dart-define=APP_ENABLE_REMOTE_TRACKING=true \
            --dart-define=APP_TRACKING_FUNCTION_ID=track_80_event \
            --dart-define=APP_TRACKING_TIMEZONE=Europe/Berlin
